# FHIR R4: BodyStructure Resource
# https://hl7.org/fhir/R4/bodystructure.html

entity:
  entity_id: fhir_body_structure
  name: BodyStructure
  description: |
    Record details about an anatomical structure. Identifies specific
    body parts or anatomical structures for procedures, conditions, etc.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: BodyStructure
    maturity_level: 2

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: active
      data_type: boolean

    - name: morphology_code
      data_type: string
      length: 50

    - name: morphology_display
      data_type: string
      length: 255

    - name: location_code
      data_type: string
      length: 50

    - name: location_display
      data_type: string
      length: 255

    - name: location_qualifier_code
      data_type: string
      length: 50

    - name: description
      data_type: string
      length: 1000

    - name: image_url
      data_type: string
      length: 255

    - name: patient_id
      data_type: string
      length: 64
      not_null: true

  relationships:
    - from: patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"
