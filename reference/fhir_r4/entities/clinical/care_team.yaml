# FHIR R4: CareTeam Resource
# https://hl7.org/fhir/R4/careteam.html

entity:
  entity_id: fhir_care_team
  name: CareTeam
  description: |
    The Care Team includes all the people and organizations who plan
    to participate in the coordination and delivery of care for a patient.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: CareTeam
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: status
      data_type: string
      length: 20
      description: proposed | active | suspended | inactive | entered-in-error

    - name: category_code
      data_type: string
      length: 50

    - name: name
      data_type: string
      length: 255

    - name: subject_patient_id
      data_type: string
      length: 64

    - name: encounter_id
      data_type: string
      length: 64

    - name: period_start
      data_type: date

    - name: period_end
      data_type: date

    - name: participant_role_code
      data_type: string
      length: 50

    - name: participant_member_practitioner_id
      data_type: string
      length: 64

    - name: participant_member_organization_id
      data_type: string
      length: 64

    - name: participant_member_patient_id
      data_type: string
      length: 64

    - name: participant_member_related_person_id
      data_type: string
      length: 64

    - name: participant_on_behalf_of_id
      data_type: string
      length: 64

    - name: participant_period_start
      data_type: date

    - name: participant_period_end
      data_type: date

    - name: reason_code
      data_type: string
      length: 50

    - name: reason_reference_condition_id
      data_type: string
      length: 64

    - name: managing_organization_id
      data_type: string
      length: 64

    - name: telecom_phone
      data_type: string
      length: 30

    - name: telecom_email
      data_type: string
      length: 255

    - name: note
      data_type: string
      length: 2000

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: managing_organization_id
      to: fhir_organization.id
      type: fk
      cardinality: "N:1"
