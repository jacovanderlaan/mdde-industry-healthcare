# FHIR R4: MedicationDispense Resource
# https://hl7.org/fhir/R4/medicationdispense.html

entity:
  entity_id: fhir_medication_dispense
  name: MedicationDispense
  description: |
    Indicates that a medication product is to be or has been dispensed
    for a named person/patient. Includes description of dispense, supply,
    and instructions for administration.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: MedicationDispense
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_fill_number
      data_type: string
      length: 50

    - name: part_of_id
      data_type: string
      length: 64

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: preparation | in-progress | cancelled | on-hold | completed | entered-in-error | stopped | declined | unknown

    - name: status_reason_code
      data_type: string
      length: 50

    - name: category_code
      data_type: string
      length: 50

    - name: medication_code
      data_type: string
      length: 50

    - name: medication_display
      data_type: string
      length: 255

    - name: medication_reference_id
      data_type: string
      length: 64

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: context_encounter_id
      data_type: string
      length: 64

    - name: supporting_information_id
      data_type: string
      length: 64

    - name: performer_actor_id
      data_type: string
      length: 64

    - name: performer_function_code
      data_type: string
      length: 50

    - name: location_id
      data_type: string
      length: 64

    - name: authorizing_prescription_id
      data_type: string
      length: 64

    - name: type_code
      data_type: string
      length: 50

    - name: quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: quantity_unit
      data_type: string
      length: 50

    - name: days_supply_value
      data_type: decimal
      precision: 10
      scale: 2

    - name: when_prepared
      data_type: timestamp

    - name: when_handed_over
      data_type: timestamp

    - name: destination_id
      data_type: string
      length: 64

    - name: receiver_id
      data_type: string
      length: 64

    - name: note
      data_type: string
      length: 2000

    - name: dosage_instruction_text
      data_type: string
      length: 500

    - name: dosage_instruction_timing
      data_type: string
      length: 500

    - name: dosage_instruction_route_code
      data_type: string
      length: 50

    - name: dosage_instruction_dose_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: dosage_instruction_dose_unit
      data_type: string
      length: 50

    - name: substitution_was_substituted
      data_type: boolean

    - name: substitution_type_code
      data_type: string
      length: 50

    - name: substitution_reason_code
      data_type: string
      length: 50

    - name: substitution_responsible_party_id
      data_type: string
      length: 64

    - name: detected_issue_id
      data_type: string
      length: 64

    - name: event_history_id
      data_type: string
      length: 64

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: context_encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: medication_reference_id
      to: fhir_medication.id
      type: fk
      cardinality: "N:1"

    - from: authorizing_prescription_id
      to: fhir_medication_request.id
      type: fk
      cardinality: "N:1"

    - from: location_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"
