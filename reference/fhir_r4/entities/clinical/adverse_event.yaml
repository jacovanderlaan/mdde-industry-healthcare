# FHIR R4: AdverseEvent Resource
# https://hl7.org/fhir/R4/adverseevent.html

entity:
  entity_id: fhir_adverse_event
  name: AdverseEvent
  description: |
    Actual or potential/avoided event causing unintended physical injury
    resulting from or contributed to by medical care, a research study
    or other healthcare setting factors.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: AdverseEvent
    maturity_level: 2

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: actuality
      data_type: string
      length: 20
      not_null: true
      description: actual | potential

    - name: category_code
      data_type: string
      length: 50
      description: product-problem | product-quality | product-use-error | wrong-dose | etc.

    - name: event_code
      data_type: string
      length: 50

    - name: event_display
      data_type: string
      length: 255

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: date
      data_type: timestamp

    - name: detected
      data_type: timestamp

    - name: recorded_date
      data_type: timestamp

    - name: resulting_condition_id
      data_type: string
      length: 64

    - name: location_id
      data_type: string
      length: 64

    - name: seriousness_code
      data_type: string
      length: 50

    - name: severity_code
      data_type: string
      length: 20
      description: mild | moderate | severe

    - name: outcome_code
      data_type: string
      length: 50
      description: resolved | recovering | ongoing | resolvedWithSequelae | fatal | unknown

    - name: recorder_id
      data_type: string
      length: 64

    - name: contributor_id
      data_type: string
      length: 64

    - name: suspect_instance_id
      data_type: string
      length: 64

    - name: suspect_instance_type
      data_type: string
      length: 50
      description: Substance | Medication | MedicationAdministration | MedicationStatement | Device | Immunization | Procedure

    - name: suspect_causality_assessment_code
      data_type: string
      length: 50

    - name: suspect_causality_product_relatedness
      data_type: string
      length: 255

    - name: suspect_causality_author_id
      data_type: string
      length: 64

    - name: suspect_causality_method_code
      data_type: string
      length: 50

    - name: subject_medical_history_id
      data_type: string
      length: 64

    - name: reference_document_id
      data_type: string
      length: 64

    - name: study_id
      data_type: string
      length: 64

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: location_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"
