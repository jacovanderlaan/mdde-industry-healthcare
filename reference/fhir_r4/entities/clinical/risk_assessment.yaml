# FHIR R4: RiskAssessment Resource
# https://hl7.org/fhir/R4/riskassessment.html

entity:
  entity_id: fhir_risk_assessment
  name: RiskAssessment
  description: |
    An assessment of the likely outcome(s) for a patient or other
    subject as well as the likelihood of each outcome.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: RiskAssessment
    maturity_level: 2

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: based_on_id
      data_type: string
      length: 64

    - name: parent_id
      data_type: string
      length: 64

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: registered | preliminary | final | amended | corrected | cancelled | entered-in-error | unknown

    - name: method_code
      data_type: string
      length: 50

    - name: code_code
      data_type: string
      length: 50

    - name: code_display
      data_type: string
      length: 255

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: occurrence_date_time
      data_type: timestamp

    - name: occurrence_period_start
      data_type: timestamp

    - name: occurrence_period_end
      data_type: timestamp

    - name: condition_id
      data_type: string
      length: 64

    - name: performer_id
      data_type: string
      length: 64

    - name: reason_code
      data_type: string
      length: 50

    - name: reason_reference_condition_id
      data_type: string
      length: 64

    - name: basis_id
      data_type: string
      length: 64
      description: Reference to supporting information

    - name: prediction_outcome_code
      data_type: string
      length: 50

    - name: prediction_outcome_display
      data_type: string
      length: 255

    - name: prediction_probability_decimal
      data_type: decimal
      precision: 5
      scale: 4

    - name: prediction_probability_range_low
      data_type: decimal
      precision: 5
      scale: 4

    - name: prediction_probability_range_high
      data_type: decimal
      precision: 5
      scale: 4

    - name: prediction_qualitative_risk_code
      data_type: string
      length: 50

    - name: prediction_relative_risk
      data_type: decimal
      precision: 10
      scale: 4

    - name: prediction_when_period_start
      data_type: timestamp

    - name: prediction_when_period_end
      data_type: timestamp

    - name: prediction_when_range_low
      data_type: decimal
      precision: 10
      scale: 4

    - name: prediction_when_range_high
      data_type: decimal
      precision: 10
      scale: 4

    - name: prediction_rationale
      data_type: string
      length: 1000

    - name: mitigation
      data_type: string
      length: 1000

    - name: note
      data_type: string
      length: 2000

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: condition_id
      to: fhir_condition.id
      type: fk
      cardinality: "N:1"
