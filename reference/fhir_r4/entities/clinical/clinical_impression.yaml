# FHIR R4: ClinicalImpression Resource
# https://hl7.org/fhir/R4/clinicalimpression.html

entity:
  entity_id: fhir_clinical_impression
  name: ClinicalImpression
  description: |
    A record of a clinical assessment performed to determine what
    problem(s) may affect the patient. A ClinicalImpression ties
    together findings, problems, and assessments.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: ClinicalImpression
    maturity_level: 2

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: in-progress | completed | entered-in-error

    - name: status_reason_code
      data_type: string
      length: 50

    - name: code_code
      data_type: string
      length: 50

    - name: description
      data_type: string
      length: 2000

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: effective_date_time
      data_type: timestamp

    - name: effective_period_start
      data_type: timestamp

    - name: effective_period_end
      data_type: timestamp

    - name: date
      data_type: timestamp

    - name: assessor_id
      data_type: string
      length: 64

    - name: previous_id
      data_type: string
      length: 64

    - name: problem_condition_id
      data_type: string
      length: 64

    - name: investigation_code
      data_type: string
      length: 50

    - name: investigation_item_id
      data_type: string
      length: 64

    - name: protocol
      data_type: string
      length: 255

    - name: summary
      data_type: string
      length: 2000

    - name: finding_item_codeable_concept_code
      data_type: string
      length: 50

    - name: finding_item_reference_condition_id
      data_type: string
      length: 64

    - name: finding_basis
      data_type: string
      length: 500

    - name: prognosis_codeable_concept_code
      data_type: string
      length: 50

    - name: prognosis_reference_risk_assessment_id
      data_type: string
      length: 64

    - name: supporting_info_id
      data_type: string
      length: 64

    - name: note
      data_type: string
      length: 2000

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: assessor_id
      to: fhir_practitioner.id
      type: fk
      cardinality: "N:1"

    - from: previous_id
      to: fhir_clinical_impression.id
      type: fk
      cardinality: "N:1"
