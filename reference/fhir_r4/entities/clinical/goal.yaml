# FHIR R4: Goal Resource
# https://hl7.org/fhir/R4/goal.html

entity:
  entity_id: fhir_goal
  name: Goal
  description: |
    Describes the intended objective(s) for a patient, group or
    organization care, for example, weight loss, restoring an activity
    of daily living, etc.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: Goal
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: lifecycle_status
      data_type: string
      length: 20
      not_null: true
      description: proposed | planned | accepted | active | on-hold | completed | cancelled | entered-in-error | rejected

    - name: achievement_status_code
      data_type: string
      length: 20
      description: in-progress | improving | worsening | no-change | achieved | sustaining | not-achieved | no-progress | not-attainable

    - name: category_code
      data_type: string
      length: 50

    - name: priority_code
      data_type: string
      length: 20
      description: high-priority | medium-priority | low-priority

    - name: description_code
      data_type: string
      length: 50

    - name: description_text
      data_type: string
      length: 1000
      not_null: true

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: start_date
      data_type: date

    - name: start_codeable_concept_code
      data_type: string
      length: 50

    - name: target_measure_code
      data_type: string
      length: 50

    - name: target_detail_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: target_detail_quantity_unit
      data_type: string
      length: 50

    - name: target_detail_range_low
      data_type: decimal
      precision: 10
      scale: 4

    - name: target_detail_range_high
      data_type: decimal
      precision: 10
      scale: 4

    - name: target_detail_codeable_concept_code
      data_type: string
      length: 50

    - name: target_detail_string
      data_type: string
      length: 255

    - name: target_detail_boolean
      data_type: boolean

    - name: target_detail_integer
      data_type: integer

    - name: target_detail_ratio_numerator
      data_type: decimal
      precision: 10
      scale: 4

    - name: target_detail_ratio_denominator
      data_type: decimal
      precision: 10
      scale: 4

    - name: target_due_date
      data_type: date

    - name: target_due_duration_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: target_due_duration_unit
      data_type: string
      length: 50

    - name: status_date
      data_type: date

    - name: status_reason
      data_type: string
      length: 500

    - name: expressed_by_id
      data_type: string
      length: 64

    - name: addresses_condition_id
      data_type: string
      length: 64

    - name: note
      data_type: string
      length: 2000

    - name: outcome_code
      data_type: string
      length: 50

    - name: outcome_reference_observation_id
      data_type: string
      length: 64

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"
