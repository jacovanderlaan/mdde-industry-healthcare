# FHIR R4: SupplyDelivery Resource
# https://hl7.org/fhir/R4/supplydelivery.html

entity:
  entity_id: fhir_supply_delivery
  name: SupplyDelivery
  description: |
    Record of delivery of what is supplied.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: SupplyDelivery
    maturity_level: 2

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: based_on_id
      data_type: string
      length: 64

    - name: part_of_id
      data_type: string
      length: 64

    - name: status
      data_type: string
      length: 20
      description: in-progress | completed | abandoned | entered-in-error

    - name: patient_id
      data_type: string
      length: 64

    - name: type_code
      data_type: string
      length: 50

    - name: supplied_item_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: supplied_item_quantity_unit
      data_type: string
      length: 50

    - name: supplied_item_item_codeable_concept_code
      data_type: string
      length: 50

    - name: supplied_item_item_reference_id
      data_type: string
      length: 64

    - name: occurrence_date_time
      data_type: timestamp

    - name: occurrence_period_start
      data_type: timestamp

    - name: occurrence_period_end
      data_type: timestamp

    - name: occurrence_timing
      data_type: string
      length: 500

    - name: supplier_id
      data_type: string
      length: 64

    - name: destination_id
      data_type: string
      length: 64

    - name: receiver_id
      data_type: string
      length: 64

  relationships:
    - from: patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: supplier_id
      to: fhir_organization.id
      type: fk
      cardinality: "N:1"

    - from: destination_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"
