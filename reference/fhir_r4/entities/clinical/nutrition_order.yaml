# FHIR R4: NutritionOrder Resource
# https://hl7.org/fhir/R4/nutritionorder.html

entity:
  entity_id: fhir_nutrition_order
  name: NutritionOrder
  description: |
    A request to supply a diet, formula feeding (enteral) or oral
    nutritional supplement to a patient/resident.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: NutritionOrder
    maturity_level: 2

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: instantiates_canonical
      data_type: string
      length: 255

    - name: instantiates_uri
      data_type: string
      length: 255

    - name: instantiates
      data_type: string
      length: 255

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: draft | active | on-hold | revoked | completed | entered-in-error | unknown

    - name: intent
      data_type: string
      length: 20
      not_null: true
      description: proposal | plan | directive | order | original-order | reflex-order | filler-order | instance-order | option

    - name: patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: date_time
      data_type: timestamp
      not_null: true

    - name: orderer_id
      data_type: string
      length: 64

    - name: allergy_intolerance_id
      data_type: string
      length: 64

    - name: food_preference_modifier_code
      data_type: string
      length: 50

    - name: exclude_food_modifier_code
      data_type: string
      length: 50

    - name: oral_diet_type_code
      data_type: string
      length: 50

    - name: oral_diet_schedule
      data_type: string
      length: 500

    - name: oral_diet_nutrient_modifier_code
      data_type: string
      length: 50

    - name: oral_diet_nutrient_amount_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: oral_diet_texture_modifier_code
      data_type: string
      length: 50

    - name: oral_diet_texture_food_type_code
      data_type: string
      length: 50

    - name: oral_diet_fluid_consistency_type_code
      data_type: string
      length: 50

    - name: oral_diet_instruction
      data_type: string
      length: 1000

    - name: supplement_type_code
      data_type: string
      length: 50

    - name: supplement_product_name
      data_type: string
      length: 255

    - name: supplement_schedule
      data_type: string
      length: 500

    - name: supplement_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: supplement_instruction
      data_type: string
      length: 1000

    - name: enteral_formula_base_formula_type_code
      data_type: string
      length: 50

    - name: enteral_formula_base_formula_product_name
      data_type: string
      length: 255

    - name: enteral_formula_additive_type_code
      data_type: string
      length: 50

    - name: enteral_formula_additive_product_name
      data_type: string
      length: 255

    - name: enteral_formula_caloric_density_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: enteral_formula_routeof_administration_code
      data_type: string
      length: 50

    - name: enteral_formula_administration_schedule
      data_type: string
      length: 500

    - name: enteral_formula_administration_rate_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: enteral_formula_max_volume_to_deliver_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: enteral_formula_administration_instruction
      data_type: string
      length: 1000

    - name: note
      data_type: string
      length: 2000

  relationships:
    - from: patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: orderer_id
      to: fhir_practitioner.id
      type: fk
      cardinality: "N:1"
