# FHIR R4: Immunization Resource
# https://hl7.org/fhir/R4/immunization.html

entity:
  entity_id: fhir_immunization
  name: Immunization
  description: |
    Describes the event of a patient being administered a vaccine or
    a record of an immunization as reported by a patient, a clinician
    or another party.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: Immunization
    maturity_level: 4
    normative: true

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: completed | entered-in-error | not-done

    - name: status_reason_code
      data_type: string
      length: 50

    - name: vaccine_code_code
      data_type: string
      length: 50
      not_null: true
      description: CVX code

    - name: vaccine_code_display
      data_type: string
      length: 255

    - name: patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: occurrence_date_time
      data_type: timestamp

    - name: occurrence_string
      data_type: string
      length: 255

    - name: recorded
      data_type: timestamp

    - name: primary_source
      data_type: boolean
      description: True if from administering provider

    - name: report_origin_code
      data_type: string
      length: 50
      description: Source of secondarily reported record

    - name: location_id
      data_type: string
      length: 64

    - name: manufacturer_id
      data_type: string
      length: 64

    - name: lot_number
      data_type: string
      length: 50

    - name: expiration_date
      data_type: date

    - name: site_code
      data_type: string
      length: 50

    - name: route_code
      data_type: string
      length: 50

    - name: dose_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: dose_quantity_unit
      data_type: string
      length: 50

    - name: performer_actor_id
      data_type: string
      length: 64

    - name: performer_function_code
      data_type: string
      length: 50

    - name: note
      data_type: string
      length: 2000

    - name: reason_code
      data_type: string
      length: 50

    - name: reason_reference_condition_id
      data_type: string
      length: 64

    - name: is_subpotent
      data_type: boolean

    - name: subpotent_reason_code
      data_type: string
      length: 50

    - name: education_document_type
      data_type: string
      length: 100

    - name: education_publication_date
      data_type: date

    - name: education_presentation_date
      data_type: date

    - name: program_eligibility_code
      data_type: string
      length: 50

    - name: funding_source_code
      data_type: string
      length: 50

    - name: reaction_date
      data_type: timestamp

    - name: reaction_detail_observation_id
      data_type: string
      length: 64

    - name: reaction_reported
      data_type: boolean

    - name: protocol_applied_series
      data_type: string
      length: 100

    - name: protocol_applied_authority_id
      data_type: string
      length: 64

    - name: protocol_applied_target_disease_code
      data_type: string
      length: 50

    - name: protocol_applied_dose_number
      data_type: integer

    - name: protocol_applied_series_doses
      data_type: integer

  relationships:
    - from: patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: location_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"
