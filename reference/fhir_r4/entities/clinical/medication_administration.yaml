# FHIR R4: MedicationAdministration Resource
# https://hl7.org/fhir/R4/medicationadministration.html

entity:
  entity_id: fhir_medication_administration
  name: MedicationAdministration
  description: |
    Describes the event of a patient consuming or otherwise being
    administered a medication. Used to record medication given to patient.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: MedicationAdministration
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: instantiates
      data_type: string
      length: 255

    - name: part_of_id
      data_type: string
      length: 64

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: in-progress | not-done | on-hold | completed | entered-in-error | stopped | unknown

    - name: status_reason_code
      data_type: string
      length: 50

    - name: category_code
      data_type: string
      length: 50
      description: inpatient | outpatient | community

    - name: medication_code
      data_type: string
      length: 50

    - name: medication_display
      data_type: string
      length: 255

    - name: medication_reference_id
      data_type: string
      length: 64

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: context_encounter_id
      data_type: string
      length: 64

    - name: supporting_information_id
      data_type: string
      length: 64

    - name: effective_date_time
      data_type: timestamp

    - name: effective_period_start
      data_type: timestamp

    - name: effective_period_end
      data_type: timestamp

    - name: performer_actor_id
      data_type: string
      length: 64

    - name: performer_function_code
      data_type: string
      length: 50

    - name: reason_code
      data_type: string
      length: 50

    - name: reason_reference_condition_id
      data_type: string
      length: 64

    - name: request_id
      data_type: string
      length: 64

    - name: device_id
      data_type: string
      length: 64

    - name: note
      data_type: string
      length: 2000

    - name: dosage_text
      data_type: string
      length: 500

    - name: dosage_site_code
      data_type: string
      length: 50

    - name: dosage_route_code
      data_type: string
      length: 50

    - name: dosage_method_code
      data_type: string
      length: 50

    - name: dosage_dose_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: dosage_dose_unit
      data_type: string
      length: 50

    - name: dosage_rate_ratio_numerator
      data_type: decimal
      precision: 10
      scale: 4

    - name: dosage_rate_ratio_denominator
      data_type: decimal
      precision: 10
      scale: 4

    - name: dosage_rate_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: event_history_id
      data_type: string
      length: 64

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: context_encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: medication_reference_id
      to: fhir_medication.id
      type: fk
      cardinality: "N:1"

    - from: request_id
      to: fhir_medication_request.id
      type: fk
      cardinality: "N:1"
