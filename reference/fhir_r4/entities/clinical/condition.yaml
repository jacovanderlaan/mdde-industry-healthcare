# FHIR R4: Condition Resource
# https://hl7.org/fhir/R4/condition.html

entity:
  entity_id: fhir_condition
  name: Condition
  description: |
    A clinical condition, problem, diagnosis, or other event, situation,
    issue, or clinical concept that has risen to a level of concern.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: Condition
    maturity_level: 5
    normative: true

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: clinical_status_code
      data_type: string
      length: 20
      description: active | recurrence | relapse | inactive | remission | resolved

    - name: verification_status_code
      data_type: string
      length: 20
      description: unconfirmed | provisional | differential | confirmed | refuted | entered-in-error

    - name: category_code
      data_type: string
      length: 50
      description: problem-list-item | encounter-diagnosis | health-concern

    - name: severity_code
      data_type: string
      length: 20
      description: severe | moderate | mild

    - name: code_system
      data_type: string
      length: 100
      description: Code system (e.g., ICD-10, SNOMED)

    - name: code_code
      data_type: string
      length: 20
      not_null: true
      description: Diagnosis code

    - name: code_display
      data_type: string
      length: 255
      description: Display name

    - name: body_site_code
      data_type: string
      length: 50

    - name: body_site_display
      data_type: string
      length: 255

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: onset_date_time
      data_type: timestamp
      description: When condition first manifested

    - name: onset_age_value
      data_type: decimal
      precision: 5
      scale: 2

    - name: onset_age_unit
      data_type: string
      length: 10

    - name: onset_period_start
      data_type: timestamp

    - name: onset_period_end
      data_type: timestamp

    - name: onset_string
      data_type: string
      length: 255

    - name: abatement_date_time
      data_type: timestamp
      description: When condition resolved

    - name: abatement_age_value
      data_type: decimal
      precision: 5
      scale: 2

    - name: abatement_string
      data_type: string
      length: 255

    - name: recorded_date
      data_type: timestamp
      description: Date condition was documented

    - name: recorder_id
      data_type: string
      length: 64
      description: Who recorded condition

    - name: asserter_id
      data_type: string
      length: 64
      description: Who asserted condition

    - name: stage_summary_code
      data_type: string
      length: 50
      description: Stage/grade summary

    - name: stage_type_code
      data_type: string
      length: 50
      description: Type of stage

    - name: evidence_code
      data_type: string
      length: 50
      description: Supporting evidence

    - name: evidence_detail_observation_id
      data_type: string
      length: 64

    - name: note
      data_type: string
      length: 2000

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"
