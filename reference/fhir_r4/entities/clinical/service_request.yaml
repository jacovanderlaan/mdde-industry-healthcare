# FHIR R4: ServiceRequest Resource
# https://hl7.org/fhir/R4/servicerequest.html

entity:
  entity_id: fhir_service_request
  name: ServiceRequest
  description: |
    A record of a request for service such as diagnostic investigations,
    treatments, or operations to be performed.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: ServiceRequest
    maturity_level: 4
    normative: true

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_placer
      data_type: string
      length: 50

    - name: identifier_filler
      data_type: string
      length: 50

    - name: instantiates_canonical
      data_type: string
      length: 255

    - name: instantiates_uri
      data_type: string
      length: 255

    - name: based_on_id
      data_type: string
      length: 64

    - name: replaces_id
      data_type: string
      length: 64

    - name: requisition_identifier
      data_type: string
      length: 50
      description: Composite request ID

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: draft | active | on-hold | revoked | completed | entered-in-error | unknown

    - name: intent
      data_type: string
      length: 20
      not_null: true
      description: proposal | plan | directive | order | original-order | reflex-order | filler-order | instance-order | option

    - name: category_code
      data_type: string
      length: 50

    - name: priority
      data_type: string
      length: 20
      description: routine | urgent | asap | stat

    - name: do_not_perform
      data_type: boolean

    - name: code_system
      data_type: string
      length: 100

    - name: code_code
      data_type: string
      length: 50

    - name: code_display
      data_type: string
      length: 255

    - name: order_detail_code
      data_type: string
      length: 50

    - name: quantity_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: quantity_ratio_numerator
      data_type: decimal
      precision: 10
      scale: 4

    - name: quantity_ratio_denominator
      data_type: decimal
      precision: 10
      scale: 4

    - name: quantity_range_low
      data_type: decimal
      precision: 10
      scale: 4

    - name: quantity_range_high
      data_type: decimal
      precision: 10
      scale: 4

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true

    - name: encounter_id
      data_type: string
      length: 64

    - name: occurrence_date_time
      data_type: timestamp

    - name: occurrence_period_start
      data_type: timestamp

    - name: occurrence_period_end
      data_type: timestamp

    - name: occurrence_timing
      data_type: string
      length: 500

    - name: as_needed_boolean
      data_type: boolean

    - name: as_needed_code
      data_type: string
      length: 50

    - name: authored_on
      data_type: timestamp

    - name: requester_id
      data_type: string
      length: 64

    - name: performer_type_code
      data_type: string
      length: 50

    - name: performer_id
      data_type: string
      length: 64

    - name: location_code
      data_type: string
      length: 50

    - name: location_reference_id
      data_type: string
      length: 64

    - name: reason_code
      data_type: string
      length: 50

    - name: reason_reference_condition_id
      data_type: string
      length: 64

    - name: insurance_id
      data_type: string
      length: 64

    - name: supporting_info_id
      data_type: string
      length: 64

    - name: specimen_id
      data_type: string
      length: 64

    - name: body_site_code
      data_type: string
      length: 50

    - name: note
      data_type: string
      length: 2000

    - name: patient_instruction
      data_type: string
      length: 1000

    - name: relevant_history_id
      data_type: string
      length: 64

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: requester_id
      to: fhir_practitioner.id
      type: fk
      cardinality: "N:1"
