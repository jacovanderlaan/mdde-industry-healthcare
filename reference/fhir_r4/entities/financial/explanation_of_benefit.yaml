# FHIR R4: ExplanationOfBenefit Resource
# https://hl7.org/fhir/R4/explanationofbenefit.html

entity:
  entity_id: fhir_explanation_of_benefit
  name: ExplanationOfBenefit
  description: |
    This resource provides the adjudication details from the processing
    of a Claim resource. The ExplanationOfBenefit (EOB) is the payer's
    response to a claim.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: ExplanationOfBenefit
    maturity_level: 3

