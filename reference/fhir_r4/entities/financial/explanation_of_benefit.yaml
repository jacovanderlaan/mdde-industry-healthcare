      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_eob_number
      data_type: string
      length: 50

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: active | cancelled | draft | entered-in-error

    - name: type_code
      data_type: string
      length: 20
      not_null: true

    - name: sub_type_code
      data_type: string
      length: 50

    - name: use
      data_type: string
      length: 20
      not_null: true
