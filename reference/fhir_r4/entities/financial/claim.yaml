# FHIR R4: Claim Resource
# https://hl7.org/fhir/R4/claim.html

entity:
  entity_id: fhir_claim
  name: Claim
  description: |
    A provider issued list of professional services and products which
    have been provided, or are to be provided, to a patient which is
    sent to an insurer for reimbursement.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: Claim
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_claim_number
      data_type: string
      length: 50

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: active | cancelled | draft | entered-in-error

    - name: type_code
      data_type: string
      length: 20
      not_null: true
      description: institutional | oral | pharmacy | professional | vision

    - name: sub_type_code
      data_type: string
      length: 50

    - name: use
      data_type: string
      length: 20
      not_null: true
      description: claim | preauthorization | predetermination

    - name: patient_id
      data_type: string
      length: 64
      not_null: true

    - name: billable_period_start
      data_type: timestamp

    - name: billable_period_end
      data_type: timestamp

    - name: created
      data_type: timestamp
      not_null: true

    - name: enterer_id
      data_type: string
      length: 64

    - name: insurer_id
      data_type: string
      length: 64

    - name: provider_id
      data_type: string
      length: 64
      not_null: true

    - name: priority_code
      data_type: string
      length: 20
      not_null: true

    - name: funds_reserve_code
      data_type: string
      length: 50

    - name: related_claim_id
      data_type: string
      length: 64

    - name: related_relationship_code
      data_type: string
      length: 50

    - name: prescription_id
      data_type: string
      length: 64

    - name: original_prescription_id
      data_type: string
      length: 64

    - name: payee_type_code
      data_type: string
      length: 50

    - name: payee_party_id
      data_type: string
      length: 64

    - name: referral_id
      data_type: string
      length: 64

    - name: facility_id
      data_type: string
      length: 64

    - name: care_team_sequence
      data_type: integer

    - name: care_team_provider_id
      data_type: string
      length: 64

    - name: care_team_responsible
      data_type: boolean

    - name: care_team_role_code
      data_type: string
      length: 50

    - name: care_team_qualification_code
      data_type: string
      length: 50

    - name: supporting_info_sequence
      data_type: integer

    - name: supporting_info_category_code
      data_type: string
      length: 50

    - name: supporting_info_code
      data_type: string
      length: 50

    - name: supporting_info_timing_date
      data_type: date

    - name: supporting_info_value_string
      data_type: string
      length: 500

    - name: supporting_info_reason_code
      data_type: string
      length: 50

    - name: diagnosis_sequence
      data_type: integer

    - name: diagnosis_code
      data_type: string
      length: 20

    - name: diagnosis_type_code
      data_type: string
      length: 50

    - name: diagnosis_on_admission_code
      data_type: string
      length: 20

    - name: diagnosis_package_code
      data_type: string
      length: 50

    - name: procedure_sequence
      data_type: integer

    - name: procedure_type_code
      data_type: string
      length: 50

    - name: procedure_date
      data_type: timestamp

    - name: procedure_code
      data_type: string
      length: 20

    - name: procedure_udi_device_id
      data_type: string
      length: 64

    - name: insurance_sequence
      data_type: integer

    - name: insurance_focal
      data_type: boolean

    - name: insurance_coverage_id
      data_type: string
      length: 64

    - name: insurance_business_arrangement
      data_type: string
      length: 100

    - name: insurance_pre_auth_ref
      data_type: string
      length: 100

    - name: insurance_claim_response_id
      data_type: string
      length: 64

    - name: accident_date
      data_type: date

    - name: accident_type_code
      data_type: string
      length: 50

    - name: accident_location_address
      data_type: string
      length: 255

    - name: item_sequence
      data_type: integer

    - name: item_care_team_sequence
      data_type: integer

    - name: item_diagnosis_sequence
      data_type: integer

    - name: item_procedure_sequence
      data_type: integer

    - name: item_information_sequence
      data_type: integer

    - name: item_revenue_code
      data_type: string
      length: 20

    - name: item_category_code
      data_type: string
      length: 50

    - name: item_product_or_service_code
      data_type: string
      length: 50

    - name: item_modifier_code
      data_type: string
      length: 50

    - name: item_program_code
      data_type: string
      length: 50

    - name: item_serviced_date
      data_type: date

    - name: item_serviced_period_start
      data_type: timestamp

    - name: item_serviced_period_end
      data_type: timestamp

    - name: item_location_code
      data_type: string
      length: 50

    - name: item_quantity_value
      data_type: decimal
      precision: 10
      scale: 4

    - name: item_unit_price_value
      data_type: decimal
      precision: 12
      scale: 2

    - name: item_factor
      data_type: decimal
      precision: 8
      scale: 4

    - name: item_net_value
      data_type: decimal
      precision: 12
      scale: 2

    - name: item_udi_device_id
      data_type: string
      length: 64

    - name: item_body_site_code
      data_type: string
      length: 50

    - name: item_sub_site_code
      data_type: string
      length: 50

    - name: item_encounter_id
      data_type: string
      length: 64

    - name: total_value
      data_type: decimal
      precision: 12
      scale: 2

  relationships:
    - from: patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: provider_id
      to: fhir_organization.id
      type: fk
      cardinality: "N:1"

    - from: insurer_id
      to: fhir_organization.id
      type: fk
      cardinality: "N:1"

    - from: facility_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"
