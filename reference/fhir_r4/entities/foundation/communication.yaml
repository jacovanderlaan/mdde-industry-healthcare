# FHIR R4: Communication Resource
# https://hl7.org/fhir/R4/communication.html

entity:
  entity_id: fhir_communication
  name: Communication
  description: |
    An occurrence of information being transmitted. E.g., a notification
    or alert that was sent to a provider, a public health agency was
    notified about a reportable condition.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: Communication
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: instantiates_canonical
      data_type: string
      length: 255

    - name: instantiates_uri
      data_type: string
      length: 255

    - name: based_on_id
      data_type: string
      length: 64

    - name: part_of_id
      data_type: string
      length: 64

    - name: in_response_to_id
      data_type: string
      length: 64

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: preparation | in-progress | not-done | on-hold | stopped | completed | entered-in-error | unknown

    - name: status_reason_code
      data_type: string
      length: 50

    - name: category_code
      data_type: string
      length: 50

    - name: priority
      data_type: string
      length: 20
      description: routine | urgent | asap | stat

    - name: medium_code
      data_type: string
      length: 50
      description: phone | fax | email | pager | url | sms | video | snail-mail

    - name: subject_patient_id
      data_type: string
      length: 64

    - name: topic_code
      data_type: string
      length: 50

    - name: about_id
      data_type: string
      length: 64

    - name: encounter_id
      data_type: string
      length: 64

    - name: sent
      data_type: timestamp

    - name: received
      data_type: timestamp

    - name: recipient_id
      data_type: string
      length: 64

    - name: sender_id
      data_type: string
      length: 64

    - name: reason_code
      data_type: string
      length: 50

    - name: reason_reference_condition_id
      data_type: string
      length: 64

    - name: payload_content_string
      data_type: string
      length: 5000

    - name: payload_content_attachment_content_type
      data_type: string
      length: 100

    - name: payload_content_attachment_url
      data_type: string
      length: 255

    - name: payload_content_attachment_title
      data_type: string
      length: 255

    - name: payload_content_reference_id
      data_type: string
      length: 64

    - name: note
      data_type: string
      length: 2000

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: encounter_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"

    - from: in_response_to_id
      to: fhir_communication.id
      type: fk
      cardinality: "N:1"
