# FHIR R4: HealthcareService Resource
# https://hl7.org/fhir/R4/healthcareservice.html

entity:
  entity_id: fhir_healthcare_service
  name: HealthcareService
  description: |
    The details of a healthcare service available at a location.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: HealthcareService
    maturity_level: 3

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_code
      data_type: string
      length: 50

    - name: active
      data_type: boolean

    - name: provided_by_id
      data_type: string
      length: 64

    - name: category_code
      data_type: string
      length: 50

    - name: type_code
      data_type: string
      length: 50

    - name: specialty_code
      data_type: string
      length: 50

    - name: location_id
      data_type: string
      length: 64

    - name: name
      data_type: string
      length: 255

    - name: comment
      data_type: string
      length: 1000

    - name: extra_details
      data_type: string
      length: 2000

    - name: photo_url
      data_type: string
      length: 255

    - name: telecom_phone
      data_type: string
      length: 30

    - name: telecom_email
      data_type: string
      length: 255

    - name: coverage_area_id
      data_type: string
      length: 64

    - name: service_provision_code
      data_type: string
      length: 50

    - name: eligibility_code
      data_type: string
      length: 50

    - name: eligibility_comment
      data_type: string
      length: 500

    - name: program_code
      data_type: string
      length: 50

    - name: characteristic_code
      data_type: string
      length: 50

    - name: communication_language
      data_type: string
      length: 10

    - name: referral_method_code
      data_type: string
      length: 50

    - name: appointment_required
      data_type: boolean

    - name: available_time_days_of_week
      data_type: string
      length: 50

    - name: available_time_all_day
      data_type: boolean

    - name: available_time_available_start_time
      data_type: time

    - name: available_time_available_end_time
      data_type: time

    - name: not_available_description
      data_type: string
      length: 255

    - name: not_available_during_start
      data_type: timestamp

    - name: not_available_during_end
      data_type: timestamp

    - name: availability_exceptions
      data_type: string
      length: 500

    - name: endpoint_url
      data_type: string
      length: 255

  relationships:
    - from: provided_by_id
      to: fhir_organization.id
      type: fk
      cardinality: "N:1"

    - from: location_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"
