# FHIR R4: Encounter Resource
# https://hl7.org/fhir/R4/encounter.html

entity:
  entity_id: fhir_encounter
  name: Encounter
  description: |
    An interaction between a patient and healthcare provider(s) for the
    purpose of providing healthcare service(s) or assessing the health
    status of a patient.

    Encompasses ambulatory visits, inpatient stays, ED visits, virtual visits.
  stereotype: src_external
  layer: source

  fhir_metadata:
    resource_type: Encounter
    maturity_level: 4
    normative: true

  attributes:
    - name: id
      data_type: string
      length: 64
      primary_key: true
      not_null: true

    - name: meta_last_updated
      data_type: timestamp

    - name: identifier_visit_number
      data_type: string
      length: 50
      description: Visit/account number

    - name: status
      data_type: string
      length: 20
      not_null: true
      description: planned | arrived | triaged | in-progress | onleave | finished | cancelled

    - name: status_history
      data_type: string
      length: 2000
      description: JSON array of status changes

    - name: class_code
      data_type: string
      length: 20
      not_null: true
      description: Classification of encounter (AMB, EMER, IMP, etc.)

    - name: class_history
      data_type: string
      length: 2000
      description: JSON array of class changes

    - name: type_code
      data_type: string
      length: 50
      description: Specific type of encounter

    - name: service_type_code
      data_type: string
      length: 50
      description: Service type

    - name: priority_code
      data_type: string
      length: 50
      description: Priority of encounter (e.g., emergency, urgent, routine)

    - name: subject_patient_id
      data_type: string
      length: 64
      not_null: true
      description: Patient reference

    - name: episode_of_care_id
      data_type: string
      length: 64

    - name: based_on_service_request_id
      data_type: string
      length: 64

    - name: participant_practitioner_id
      data_type: string
      length: 64
      description: Primary practitioner

    - name: participant_type
      data_type: string
      length: 50
      description: Role of participant (e.g., primary, admitting, attending)

    - name: appointment_id
      data_type: string
      length: 64

    - name: period_start
      data_type: timestamp
      description: Start time of encounter

    - name: period_end
      data_type: timestamp
      description: End time of encounter

    - name: length_value
      data_type: decimal
      precision: 10
      scale: 2
      description: Length of encounter in minutes

    - name: reason_code
      data_type: string
      length: 50
      description: Reason for encounter (coded)

    - name: reason_reference_condition_id
      data_type: string
      length: 64
      description: Reference to reason condition

    - name: diagnosis_condition_id
      data_type: string
      length: 64
      description: Primary diagnosis

    - name: diagnosis_use_code
      data_type: string
      length: 20
      description: Role of diagnosis (AD, DD, CC, etc.)

    - name: diagnosis_rank
      data_type: integer
      description: Ranking of diagnosis

    - name: hospitalization_admit_source
      data_type: string
      length: 50

    - name: hospitalization_readmission
      data_type: boolean

    - name: hospitalization_diet_preference
      data_type: string
      length: 50

    - name: hospitalization_special_courtesy
      data_type: string
      length: 50

    - name: hospitalization_special_arrangement
      data_type: string
      length: 50

    - name: hospitalization_destination_id
      data_type: string
      length: 64

    - name: hospitalization_discharge_disposition
      data_type: string
      length: 50

    - name: location_id
      data_type: string
      length: 64

    - name: location_status
      data_type: string
      length: 20

    - name: location_physical_type
      data_type: string
      length: 50

    - name: location_period_start
      data_type: timestamp

    - name: location_period_end
      data_type: timestamp

    - name: service_provider_id
      data_type: string
      length: 64
      description: Organization responsible

    - name: part_of_id
      data_type: string
      length: 64
      description: Parent encounter

  relationships:
    - from: subject_patient_id
      to: fhir_patient.id
      type: fk
      cardinality: "N:1"

    - from: participant_practitioner_id
      to: fhir_practitioner.id
      type: fk
      cardinality: "N:1"

    - from: location_id
      to: fhir_location.id
      type: fk
      cardinality: "N:1"

    - from: service_provider_id
      to: fhir_organization.id
      type: fk
      cardinality: "N:1"

    - from: part_of_id
      to: fhir_encounter.id
      type: fk
      cardinality: "N:1"
