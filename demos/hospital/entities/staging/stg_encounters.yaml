entity:
  entity_id: stg_encounters
  name: Staged Encounters
  description: |
    Cleaned and validated encounter/visit data from multiple sources.
    Conforms to FHIR Encounter resource structure.
  stereotype: stg_cleaned
  layer: staging

  fhir_mapping:
    resource: Encounter
    version: R4

  compliance:
    hipaa:
      scope: true
      phi_elements: [patient_hash_key, visit_number]

  tags: [phi, clinical]

  lineage:
    sources:
      - entity_id: src_ehr_system
        mapping_type: transform
      - entity_id: src_hl7_messages
        mapping_type: transform

  attributes:
    - name: encounter_hash_key
      data_type: string
      length: 64
      description: Hash key for encounter identification
      business_key: true
      derived:
        expression: "MD5(CONCAT(source_system, '|', visit_number))"

    - name: visit_number
      data_type: string
      length: 30
      description: Visit/encounter number
      not_null: true

    - name: source_encounter_id
      data_type: string
      length: 36
      description: Original encounter ID from source

    - name: source_system
      data_type: string
      length: 50
      description: Source system identifier

    - name: patient_hash_key
      data_type: string
      length: 64
      description: Patient hash key (FK)
      not_null: true
      tags: [phi]

    - name: encounter_class
      data_type: string
      length: 20
      description: Encounter class (inpatient, outpatient, emergency, etc.)

    - name: encounter_type_code
      data_type: string
      length: 20
      nullable: true
      description: Encounter type code

    - name: encounter_type_desc
      data_type: string
      length: 100
      nullable: true
      description: Encounter type description

    - name: status
      data_type: string
      length: 20
      description: Encounter status (FHIR ValueSet)

    - name: priority
      data_type: string
      length: 20
      nullable: true
      description: Encounter priority

    - name: admission_type
      data_type: string
      length: 20
      nullable: true
      description: Admission type code

    - name: admission_source
      data_type: string
      length: 50
      nullable: true
      description: Admission source

    - name: admit_datetime
      data_type: timestamp
      description: Admission/arrival timestamp

    - name: discharge_datetime
      data_type: timestamp
      nullable: true
      description: Discharge timestamp

    - name: discharge_disposition
      data_type: string
      length: 50
      nullable: true
      description: Discharge disposition code

    - name: length_of_stay_minutes
      data_type: integer
      nullable: true
      description: Length of stay in minutes
      derived:
        expression: "DATEDIFF(minute, admit_datetime, COALESCE(discharge_datetime, CURRENT_TIMESTAMP))"

    - name: attending_provider_id
      data_type: string
      length: 20
      nullable: true
      description: Attending physician NPI

    - name: attending_provider_name
      data_type: string
      length: 100
      nullable: true
      description: Attending physician name

    - name: admitting_provider_id
      data_type: string
      length: 20
      nullable: true
      description: Admitting physician NPI

    - name: facility_id
      data_type: string
      length: 36
      nullable: true
      description: Facility identifier

    - name: facility_name
      data_type: string
      length: 100
      nullable: true
      description: Facility name

    - name: department_id
      data_type: string
      length: 20
      nullable: true
      description: Department identifier

    - name: department_name
      data_type: string
      length: 100
      nullable: true
      description: Department name

    - name: room
      data_type: string
      length: 20
      nullable: true
      description: Room number

    - name: bed
      data_type: string
      length: 20
      nullable: true
      description: Bed identifier

    - name: service_line
      data_type: string
      length: 50
      nullable: true
      description: Service line (Cardiology, Oncology, etc.)

    - name: primary_diagnosis_code
      data_type: string
      length: 10
      nullable: true
      description: Primary ICD-10 diagnosis
      tags: [clinical]

    - name: primary_diagnosis_desc
      data_type: string
      length: 200
      nullable: true
      description: Primary diagnosis description

    - name: drg_code
      data_type: string
      length: 5
      nullable: true
      description: DRG code

    - name: drg_weight
      data_type: decimal
      precision: 8
      scale: 4
      nullable: true
      description: DRG weight

    - name: financial_class
      data_type: string
      length: 20
      nullable: true
      description: Financial class code

    - name: insurance_plan_id
      data_type: string
      length: 30
      nullable: true
      description: Primary insurance plan ID

    - name: load_ts
      data_type: timestamp
      description: ETL load timestamp

    - name: record_source
      data_type: string
      length: 50
      description: Record source identifier

  quality_rules:
    - rule_id: stg_enc_001
      name: Required Visit Number
      expression: "visit_number IS NOT NULL"
      severity: error

    - rule_id: stg_enc_002
      name: Valid Encounter Class
      expression: "encounter_class IN ('inpatient', 'outpatient', 'ambulatory', 'emergency', 'home', 'field', 'virtual', 'observation')"
      severity: error

    - rule_id: stg_enc_003
      name: Valid Status
      expression: "status IN ('planned', 'arrived', 'triaged', 'in-progress', 'onleave', 'finished', 'cancelled', 'entered-in-error', 'unknown')"
      severity: error

    - rule_id: stg_enc_004
      name: Discharge After Admit
      expression: "discharge_datetime IS NULL OR discharge_datetime >= admit_datetime"
      severity: error
